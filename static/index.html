<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lease Intelligence Pipeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-mono">

  <div class="max-w-6xl mx-auto px-6 py-12">
    <h1 class="text-2xl font-bold mb-1 tracking-tight">Lease Intelligence Pipeline</h1>
    <p class="text-gray-400 text-sm mb-10">Upload multiple lease PDFs to generate a rent roll with risk analysis.</p>

    <!-- Upload -->
    <label id="dropzone" class="flex flex-col items-center justify-center border-2 border-dashed border-gray-700 rounded-xl p-10 cursor-pointer hover:border-indigo-500 transition-colors">
      <svg class="w-8 h-8 text-gray-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 16v-8m0 0-3 3m3-3 3 3M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1"/>
      </svg>
      <span id="dropLabel" class="text-gray-400 text-sm">Drop lease PDFs or click to browse (multiple allowed)</span>
      <input id="fileInput" type="file" accept=".pdf" multiple class="hidden" />
    </label>

    <!-- Spinner -->
    <div id="spinner" class="hidden mt-8 flex items-center gap-3 text-indigo-400 text-sm">
      <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
      </svg>
      Processing leases…
    </div>

    <!-- Results -->
    <div id="results" class="hidden mt-10 space-y-8">

      <!-- Rent Roll Table -->
      <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800">
          <h2 class="text-sm font-semibold text-indigo-400 uppercase tracking-widest">Rent Roll</h2>
          <button id="csvBtn" class="text-xs bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded transition-colors">Export CSV</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="text-gray-500 text-xs uppercase">
              <tr>
                <th class="px-4 py-3 text-left">Tenant</th>
                <th class="px-4 py-3 text-left">Address</th>
                <th class="px-4 py-3 text-right">Rent/mo</th>
                <th class="px-4 py-3 text-right">$/sqft</th>
                <th class="px-4 py-3 text-left">Start</th>
                <th class="px-4 py-3 text-left">End</th>
                <th class="px-4 py-3 text-right">Escalation</th>
                <th class="px-4 py-3 text-center">Guarantee</th>
                <th class="px-4 py-3 text-center">Risk</th>
              </tr>
            </thead>
            <tbody id="rentRollBody" class="divide-y divide-gray-800"></tbody>
          </table>
        </div>
      </div>

      <!-- Risk Flags Panel -->
      <div class="bg-gray-900 rounded-xl border border-gray-800 p-6">
        <h2 class="text-sm font-semibold text-red-400 uppercase tracking-widest mb-4">Landlord Risk Flags</h2>
        <div id="riskFlagsPanel" class="space-y-4"></div>
      </div>

      <!-- Inconsistencies + Opportunities -->
      <div class="grid grid-cols-2 gap-6">
        <div class="bg-gray-900 rounded-xl border border-gray-800 p-6">
          <h2 class="text-sm font-semibold text-red-400 uppercase tracking-widest mb-4">Inconsistencies</h2>
          <ul id="inconsistenciesList" class="space-y-2 text-sm text-gray-300 list-disc list-inside"></ul>
        </div>
        <div class="bg-gray-900 rounded-xl border border-gray-800 p-6">
          <h2 class="text-sm font-semibold text-green-400 uppercase tracking-widest mb-4">Opportunities</h2>
          <ul id="opportunitiesList" class="space-y-2 text-sm text-gray-300 list-disc list-inside"></ul>
        </div>
      </div>

      <!-- Risk Score Chart -->
      <div class="bg-gray-900 rounded-xl border border-gray-800 p-6">
        <h2 class="text-sm font-semibold text-indigo-400 uppercase tracking-widest mb-6">Risk Scores</h2>
        <canvas id="riskChart" height="80"></canvas>
      </div>

    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const spinner   = document.getElementById('spinner');
    const results   = document.getElementById('results');
    const dropLabel = document.getElementById('dropLabel');

    let lastFiles = null;

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) handleUpload(fileInput.files);
    });

    async function handleUpload(files) {
      lastFiles = files;
      dropLabel.textContent = `${files.length} file${files.length > 1 ? 's' : ''} selected`;
      results.classList.add('hidden');
      spinner.classList.remove('hidden');

      const form = new FormData();
      for (const f of files) form.append('files', f);

      try {
        const res  = await fetch('/api/rent-roll', { method: 'POST', body: form });
        const data = await res.json();
        renderResults(data);
      } catch (e) {
        dropLabel.textContent = 'Error — try again';
      } finally {
        spinner.classList.add('hidden');
      }
    }

    document.getElementById('csvBtn').addEventListener('click', () => {
      window.location.href = '/api/rent-roll/csv';
    });

    let riskChart = null;

    function renderResults(data) {
      // Rent roll rows
      document.getElementById('rentRollBody').innerHTML = data.rows.map(r => `
        <tr class="hover:bg-gray-800 transition-colors">
          <td class="px-4 py-3">${r.tenant_name ?? '—'}</td>
          <td class="px-4 py-3 text-gray-400 text-xs">${r.property_address ?? '—'}</td>
          <td class="px-4 py-3 text-right">${r.base_rent_monthly ? '$' + r.base_rent_monthly.toLocaleString() : '—'}</td>
          <td class="px-4 py-3 text-right">${r.rent_per_sqft ? '$' + r.rent_per_sqft : '—'}</td>
          <td class="px-4 py-3">${r.lease_start ?? '—'}</td>
          <td class="px-4 py-3">${r.lease_end ?? '—'}</td>
          <td class="px-4 py-3 text-right">${r.rent_escalation_pct != null ? r.rent_escalation_pct + '%' : '—'}</td>
          <td class="px-4 py-3 text-center">${r.personal_guarantee === true ? '✓' : r.personal_guarantee === false ? '✗' : '—'}</td>
          <td class="px-4 py-3 text-center"><span class="text-xs px-2 py-0.5 rounded-full ${riskColor(r.risk_score)}">${r.risk_score ?? '—'}</span></td>
        </tr>
      `).join('');

      // Risk flags panel
      document.getElementById('riskFlagsPanel').innerHTML = data.rows.map(r => `
        <div>
          <p class="text-xs text-gray-400 mb-2">${r.tenant_name || r.filename}</p>
          <div class="flex flex-wrap gap-2">
            ${r.risk_flags.length
              ? r.risk_flags.map(f => `<span class="bg-red-950 text-red-300 text-xs px-2 py-0.5 rounded">${f}</span>`).join('')
              : '<span class="text-gray-600 text-xs">No flags</span>'}
          </div>
        </div>
      `).join('');

      // Inconsistencies
      document.getElementById('inconsistenciesList').innerHTML = data.inconsistencies.length
        ? data.inconsistencies.map(i => `<li>${i}</li>`).join('')
        : '<li class="text-gray-500">None found</li>';

      // Opportunities
      document.getElementById('opportunitiesList').innerHTML = data.opportunities.length
        ? data.opportunities.map(o => `<li>${o}</li>`).join('')
        : '<li class="text-gray-500">None found</li>';

      // Risk chart
      const labels = data.rows.map(r => r.tenant_name || r.filename);
      const scores = data.rows.map(r => r.risk_score ?? 0);
      const colors = scores.map(s => s <= 3 ? '#22c55e' : s <= 6 ? '#eab308' : '#ef4444');

      if (riskChart) riskChart.destroy();
      riskChart = new Chart(document.getElementById('riskChart'), {
        type: 'bar',
        data: { labels, datasets: [{ data: scores, backgroundColor: colors, borderRadius: 4 }] },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            y: { min: 0, max: 10, ticks: { color: '#6b7280' }, grid: { color: '#1f2937' } },
            x: { ticks: { color: '#6b7280' }, grid: { display: false } },
          },
        },
      });

      results.classList.remove('hidden');
    }

    function riskColor(score) {
      if (score == null) return 'bg-gray-800 text-gray-400';
      if (score <= 3) return 'bg-green-900 text-green-300';
      if (score <= 6) return 'bg-yellow-900 text-yellow-300';
      return 'bg-red-900 text-red-300';
    }
  </script>
</body>
</html>
